# .github/workflows/bing-archive.yaml

name: Bing Wallpaper Archive

on:
  schedule:
    - cron: '0 5 1,15 * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: 'false'
        type: string

env:
  PYTHON_VERSION: '3.12'
  IMAGE_DIR: 'image'
  IMAGE_ARCHIVE_DIR: 'image-archive'

jobs:
  archive-wallpapers:
    runs-on: ubuntu-latest
    concurrency:
      group: bing-archive
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            /*
            !image-archive/
            !image/archive/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Configure Git user
        run: |
          git config --global user.name "sw"
          git config --global user.email "vwx@github.com"

      - name: Run archive script
        run: |
          python archive.py \
            --source ${IMAGE_DIR} \
            --archive ${IMAGE_ARCHIVE_DIR} \
            --verbose
        env:
          VERBOSE: ${{ inputs.verbose || 'false' }}

      - name: Check for changes
        id: git-check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "No archives to commit"
          fi

      - name: Commit and push updates
        if: steps.git-check.outputs.changes_detected == 'true'
        run: |
          git add ${IMAGE_DIR}/ ${IMAGE_ARCHIVE_DIR}/
          git commit -m "Archive wallpapers $(date +'%Y-%m-%d %H:%M')"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
