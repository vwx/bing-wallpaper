# .github/workflows/bing-archive.yaml

name: Bing Wallpaper Archive

on:
  schedule:
    - cron: '0 5 1,15 * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: 'false'
        type: string
  pull_request:
    paths:
      - 'archive.py'
      - '.github/workflows/bing-archive.yaml'
      - 'requirements.txt'

env:
  PYTHON_VERSION: '3.12'
  IMAGE_DIR: 'image'
  IMAGE_ARCHIVE_DIR: 'image-archive'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  archive-wallpapers:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    concurrency:
      group: bing-archive
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            /*
            !image-archive/
            !image/archive/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git user
        run: |
          git config --global user.name 'sw'
          git config --global user.email '96579+vwx@users.noreply.github.com'

      - name: Run archive script
        run: |
          python archive.py \
            --source ${IMAGE_DIR} \
            --archive ${IMAGE_ARCHIVE_DIR} \
            --verbose
        env:
          VERBOSE: ${{ inputs.verbose || 'false' }}

      - name: Check for changes
        id: git-check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo 'changes_detected=true' >> $GITHUB_OUTPUT
            echo 'Changes detected:'
            git status --short
          else
            echo 'changes_detected=false' >> $GITHUB_OUTPUT
            echo 'No archives to commit'
          fi

      - name: Commit and push updates
        if: steps.git-check.outputs.changes_detected == 'true'
        run: |
          git add ${IMAGE_DIR}/ ${IMAGE_ARCHIVE_DIR}/
          minute=$(date +%M)
          rounded_minute=$((minute / 10 * 10))
          timestamp_iso=$(date +'%Y-%m-%dT%H:')$(printf '%02d' $rounded_minute)':00'
          timestamp_msg=$(date +'%Y-%m-%d %H:')$(printf '%02d' $rounded_minute)
          git commit --date="${timestamp_iso}" -m "Archive wallpapers ${timestamp_msg}"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
